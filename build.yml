# Clone the repo (if you haven't already)
git clone https://github.com/JJTheKing44/attract-mode-plus-layout-designer.git
cd attract-mode-plus-layout-designer

# Create the workflows directory if it doesn't exist
mkdir -p .github/workflows

# Copy the build.yml file into that directory
cp build.yml .github/workflows/

# Commit and push
git add .github/workflows/build.yml
git commit -m "Add build.yml workflow"
git push origin main
